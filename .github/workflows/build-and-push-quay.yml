name: Build & Push to Quay2

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

 

    - name: Login to Quay
      run: echo "${{ secrets.QUAY_PASSWORD }}" | docker login quay.io \
            -u "${{ secrets.QUAY_USERNAME }}" \
            --password-stdin

    - name: Build image
      run: |
        docker build \
          -t quay.io/phatthananvst01/quaytest2603:latest \
          -t quay.io/phatthananvst01/quaytest2603:dev .

    - name: Push image
      run: |
        docker push quay.io/phatthananvst01/quaytest2603:latest
        docker push quay.io/phatthananvst01/quaytest2603:dev
 
          
          



