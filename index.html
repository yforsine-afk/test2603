<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenShift Deployment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 2.3em;
      margin-bottom: 12px;
    }

    p {
      font-size: 1.1em;
      line-height: 1.7;
      opacity: 0.95;
    }

    .badge {
      display: inline-block;
      margin-top: 22px;
      padding: 10px 22px;
      border-radius: 30px;
      background-color: #0d6efd;
      font-weight: bold;
      font-size: 1em;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.95em;
      opacity: 0.85;
    }

    .footer span {
      color: #e3f2fd;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔵 OpenShift Deployment</h1>

    <p>
      This application is successfully deployed on
      <strong>Red Hat OpenShift</strong><br />
      using a container image from
      <strong>Red Hat Quay</strong>
    </p>

    <div class="badge">CI / CD Blue Test</div>

    <div class="footer">
      Managed by <span>GitHub Actions</span> &
      <span>ImageChangeTrigger</span><br />
      © 2026 Demo Application
    </div>
  </div>
</body>
</html>
