<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome to OpenShift</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(
        135deg,
        #ff0000,
        #ff8800,
        #ffff00,
        #00ff00,
        #00ffff,
        #0000ff,
        #8a2be2
      );
      background-size: 400% 400%;
      animation: rainbow-bg 12s ease infinite;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes rainbow-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 2.3em;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #ff5555, #ffd700, #00ffcc, #5599ff, #cc66ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.1em;
      line-height: 1.6;
      opacity: 0.95;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: bold;
      background: linear-gradient(90deg, #ff0000, #ff9900, #ffee00, #00ff66, #00ccff, #6633ff);
      color: #000;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9em;
      opacity: 0.9;
    }

    .footer span {
      font-weight: bold;
      background: linear-gradient(90deg, #ff6666, #ffff66, #66ffcc, #6699ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 OpenShift Test Deployment</h1>
    <p>
      This application is successfully deployed
      on <strong>Red Hat OpenShift</strong><br />
      using Container Image from <strong>Red Hat Quay</strong>
