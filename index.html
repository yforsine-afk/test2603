<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome to OpenShift</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #5f2c82, #7f00ff);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1em;
      line-height: 1.6;
      opacity: 0.95;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 18px;
      border-radius: 22px;
      background-color: #9b59b6;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9em;
      opacity: 0.85;
    }

    .footer span {
      color: #e0c3ff;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🟣 OpenShift Deployment</h1>
    <p>
      This application is successfully deployed
      on <strong>Red Hat OpenShift</strong><br />
      using Container Image from <strong>Red Hat Quay</strong>
    </p>

    <div class="badge">CI / CD Ready</div>

    <div class="footer">
      Managed by <span>GitHub Actions</span> & <span>Argo CD</span><br />
      © 2026 Demo Application
    </div>
  </div>
</body>
</html>
